name: Release

# Builds and publishes a macOS (arm64) release entirely on GitHub —
# no local machine involved. Trigger from the Actions tab: pick a version
# bump, and the workflow bumps package.json, builds the app, pushes the
# version commit + tag, and publishes a GitHub Release with the dmg/zip
# assets the in-app updater (src/main/lib/updates) consumes.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest # Apple Silicon; the agent runtime is staged arch-native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The real Electron binary is required here (unlike CI) — the packaged
      # app ships it.
      - run: pnpm install --frozen-lockfile

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "v%s"
          echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Stage agent runtime
        run: pnpm stage:agent-runtime

      # The monaco-heavy renderer bundle blows Node's default ~2GB heap.
      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Package (unsigned)
        run: pnpm exec electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Only push the version commit + tag once the build has succeeded, so a
      # failed run never burns a version number.
      - name: Push version commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
