name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Native modules (better-sqlite3, node-pty) still build; the electron
  # binary itself is never launched in CI, so skip the ~100MB download.
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm check:commands

      - run: pnpm test

      # The monaco-heavy renderer bundle blows Node's default ~2GB heap.
      - run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
