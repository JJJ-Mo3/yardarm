appId: dev.yardarm.app
productName: Yardarm
# Pinned so the in-app updater (src/main/lib/updates) can match release assets
# by name: Yardarm-<version>-<arch>.<ext>.
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  buildResources: build
  output: dist

files:
  - out/**
  - package.json
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

# Native addons (.node) cannot be loaded from within an asar file.
asarUnpack:
  - '**/*.node'
  - node_modules/node-pty/**
  - node_modules/better-sqlite3/**

npmRebuild: true

extraResources:
  # Self-contained mastracode runtime for the agent host, staged by
  # scripts/build-agent-runtime.mjs via npm (electron-builder's pnpm walker
  # mis-pairs the multi-version @ai-sdk/* packages, so mastracode lives in
  # devDependencies and is never bundled into the asar). The agent host
  # imports mastracode from here when packaged (HostBootConfig.agentRuntimePath).
  - from: vendor/agent-runtime/node_modules
    to: agent-runtime/node_modules

mac:
  category: public.app-category.developer-tools
  # arm64 only: scripts/build-agent-runtime.mjs stages native modules for the
  # build machine's architecture, so a cross-arch x64 artifact would be broken.
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Development

publish: null
